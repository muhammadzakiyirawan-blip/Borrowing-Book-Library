<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PustakaFlow - Profile</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        navy: {
                            900: '#111827',
                        },
                        silver: {
                            300: '#D1D5DB',
                            400: '#9CA3AF',
                        },
                        mainbg: '#F9FAFB',
                    }
                }
            }
        }
    </script>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="flex h-screen overflow-hidden bg-mainbg text-gray-800">

    <!-- Left Sidebar -->
    <aside class="w-64 bg-navy-900 flex-shrink-0 flex flex-col border-r border-gray-800 shadow-lg">
        <!-- Logo / Brand -->
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <img src="image/logo.png" alt="PustakaFlow Logo" class="h-8 w-auto">
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="index.html" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">Dashboard</span>
            </a>
            <a href="catalog.html" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">Catalog</span>
            </a>
            <a href="my-library.html" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">My Library</span>
            </a>
            <a href="admin-scanner.html" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">Admin Portal</span>
            </a>
        </nav>

        <!-- Profile / Logout -->
        <div class="p-4 border-t border-gray-800">
            <div class="flex items-center gap-3 px-2">
                <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-silver-300 font-serif font-bold text-sm border border-gray-600">
                    A
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-medium text-gray-300">Alex (Member)</span>
                    <span class="logout-btn text-xs text-gray-500 hover:text-gray-400 cursor-pointer transition-colors duration-200">Logout</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col overflow-hidden bg-mainbg">
        <!-- Topbar -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 justify-between shrink-0">
            <!-- Search -->
            <div class="flex-1 max-w-md relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </span>
                <input type="text"
                    class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:border-slate-500 focus:ring-1 focus:ring-slate-500 sm:text-sm transition-colors duration-200"
                    placeholder="Search catalogs, members...">
            </div>

            <!-- User Profile Dropdown -->
            <div class="ml-4 flex items-center gap-4">
                <button class="text-slate-500 hover:text-slate-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                        </path>
                    </svg>
                </button>
                <div class="relative">
                    <button id="profileToggleBtn" class="focus:outline-none flex items-center justify-center">
                        <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-medium text-sm border border-slate-300">
                            JD
                        </div>
                    </button>
                    <!-- Dropdown Menu -->
                    <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white shadow-lg rounded-lg border border-gray-100 z-50 overflow-hidden">
                        <div class="py-1">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:text-navy-900 hover:bg-gray-100 transition-colors">Edit Profile</a>
                            <a href="#" class="logout-btn block px-4 py-2 text-sm text-gray-700 hover:text-navy-900 hover:bg-gray-100 transition-colors">Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Scrollable Area -->
        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-3xl mx-auto space-y-8">
                <!-- Page Title -->
                <header>
                    <h2 class="text-3xl font-serif font-medium text-navy-900">Account Settings</h2>
                </header>

                <!-- Profile Form Card -->
                <div class="bg-white rounded-xl p-8 shadow-sm border border-gray-100">
                    <form class="space-y-8">
                        
                        <!-- Avatar Section -->
                        <div class="flex items-center gap-6">
                            <div class="w-20 h-20 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-medium text-2xl border border-slate-300 shadow-sm">
                                JD
                            </div>
                            <div>
                                <button type="button" class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-navy-900">
                                    Change Avatar
                                </button>
                                <p class="text-xs text-gray-500 mt-2">JPG, GIF or PNG. Max size of 800K</p>
                            </div>
                        </div>
                        
                        <hr class="border-gray-100">

                        <!-- Email Address -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                            <input type="email" id="email" value="alex.thompson@example.com" disabled readonly 
                                class="w-full bg-gray-50 text-gray-500 border border-gray-200 rounded-lg px-4 py-2.5 cursor-not-allowed focus:outline-none">
                            <p class="text-xs text-gray-500 mt-2">Email address cannot be changed.</p>
                        </div>

                        <!-- Full Name -->
                        <div>
                            <label for="fullName" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                            <input type="text" id="fullName" value="Alex Thompson" 
                                class="w-full bg-white text-gray-900 border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-navy-900 focus:ring-1 focus:ring-navy-900 transition-colors">
                        </div>

                        <!-- Submit Button -->
                        <div class="flex justify-end pt-4">
                            <button type="submit" class="px-6 py-2.5 bg-navy-900 hover:bg-gray-800 text-white text-sm font-medium rounded-lg shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-navy-900">
                                Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- External Scripts -->
    <script src="js/global.js" defer></script>
</body>
</html>
