<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PustakaFlow – Add Book</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        navy: {
                            900: '#111827',
                        },
                        slate: {
                            500: '#475569',
                        },
                    },
                },
            },
        }
    </script>
    <!-- Global Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin-add-book.css">
</head>
<body class="flex h-screen overflow-hidden bg-mainbg text-gray-800">
    <!-- Sidebar -->
    <aside class="w-64 bg-navy-900 flex-shrink-0 flex flex-col border-r border-gray-800 shadow-lg">
        <!-- Logo / Brand -->
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <img src="image/logo.png" alt="PustakaFlow Logo" class="h-8 w-auto">
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="index.html" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">Dashboard</span>
            </a>
            <a href="catalog.html" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">Catalog</span>
            </a>
            <a href="my-library.html" class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">My Library</span>
            </a>
            <!-- Active State -->
            <a href="admin-scanner.html" class="nav-link flex items-center px-4 py-3 text-white bg-gray-800 rounded-md">
                <span class="text-sm font-medium">Admin Portal</span>
            </a>
        </nav>

        <!-- Profile / Logout -->
        <div class="p-4 border-t border-gray-800">
            <div class="flex items-center gap-3 px-2">
                <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-silver-300 font-serif font-bold text-sm border border-gray-600">
                    A
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-medium text-gray-300">Alex (Member)</span>
                    <span class="logout-btn text-xs text-gray-500 hover:text-gray-400 cursor-pointer transition-colors duration-200">Logout</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden bg-mainbg">
        <!-- Topbar -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 justify-between shrink-0">
            <div class="flex-1 max-w-md relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </span>
                <input type="text" placeholder="Search books, authors..." class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:border-slate-500 focus:ring-1 focus:ring-slate-500 sm:text-sm transition-colors duration-200">
            </div>
            <div class="ml-4 flex items-center gap-4">
                <button class="text-slate-500 hover:text-slate-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                </button>
                <div class="relative">
                    <button id="profileToggleBtn" class="focus:outline-none flex items-center justify-center">
                        <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-medium text-sm border border-slate-300">
                            JD
                        </div>
                    </button>
                    <!-- Dropdown Menu -->
                    <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white shadow-lg rounded-lg border border-gray-100 z-50 overflow-hidden">
                        <div class="py-1">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:text-navy-900 hover:bg-gray-100 transition-colors">Edit Profile</a>
                            <a href="#" class="logout-btn block px-4 py-2 text-sm text-gray-700 hover:text-navy-900 hover:bg-gray-100 transition-colors">Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Form Section -->
        <section class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                <h2 class="text-2xl font-serif font-medium text-gray-800 mb-6">Add New Book</h2>
                <form id="addBookForm" class="space-y-6">
                    <!-- Title -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" for="title">Title</label>
                        <input type="text" id="title" name="title" required class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:border-navy-900 focus:ring-1 focus:ring-navy-900" placeholder="Enter book title">
                    </div>
                    <!-- Author -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" for="author">Author</label>
                        <input type="text" id="author" name="author" required class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:border-navy-900 focus:ring-1 focus:ring-navy-900" placeholder="Enter author name">
                    </div>
                    <!-- ISBN -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" for="isbn">ISBN</label>
                        <input type="text" id="isbn" name="isbn" required class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:border-navy-900 focus:ring-1 focus:ring-navy-900" placeholder="e.g., 978-3-16-148410-0">
                    </div>
                    <!-- Category -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" for="category">Category</label>
                        <select id="category" name="category" required class="w-full border border-gray-300 bg-white rounded-md px-4 py-2 focus:outline-none focus:border-navy-900 focus:ring-1 focus:ring-navy-900">
                            <option value="" disabled selected>Select a category</option>
                            <option>Fiction</option>
                            <option>Science</option>
                            <option>History</option>
                            <option>Technology</option>
                        </select>
                    </div>
                    <!-- File Uploads -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Cover Image -->
                        <div class="border border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-slate-500 transition-colors">
                            <label for="coverImage" class="cursor-pointer block">
                                <svg class="mx-auto h-12 w-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"/></svg>
                                <span class="mt-2 block text-sm font-medium text-gray-700">Book Cover Image (PNG, JPG)</span>
                                <input type="file" id="coverImage" name="coverImage" accept="image/*" class="hidden" />
                            </label>
                            <p class="mt-1 text-xs text-gray-500">Drag &amp; drop or click to select file</p>
                            <!-- Cover Image Preview -->
                            <img id="coverPreview" src="" alt="Cover Preview" class="mt-3 hidden w-32 h-32 object-cover rounded border border-gray-300" />
                        </div>
                        <!-- PDF Upload -->
                        <div class="border border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-slate-500 transition-colors">
                            <label for="pdfFile" class="cursor-pointer block">
                                <svg class="mx-auto h-12 w-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                <span class="mt-2 block text-sm font-medium text-gray-700">Digital Book (PDF)</span>
                                <input type="file" id="pdfFile" name="pdfFile" accept="application/pdf" class="hidden" />
                            </label>
                            <p class="mt-1 text-xs text-gray-500">Drag & drop or click to select PDF</p>
                            <!-- PDF Preview Button -->
                            <button type="button" id="pdfPreviewBtn" class="mt-2 px-3 py-1 bg-slate-500 text-white rounded hover:bg-slate-600 transition-colors">PDF Preview</button>
                            <!-- PDF Preview Modal -->
                            <div id="pdfModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden">
                              <div class="bg-white rounded-lg p-4 max-w-md w-full">
                                <div class="flex justify-between items-center mb-2">
                                  <h3 class="text-lg font-medium">PDF Preview</h3>
                                  <button id="closePdfModal" class="text-gray-500 hover:text-gray-700">&times;</button>
                                </div>
                                <div id="pdfContent" class="h-64 overflow-auto">
                                  <p class="text-sm text-gray-600" id="pdfFileName">No PDF selected.</p>
                                </div>
                              </div>
                            </div>
                        </div>
                    </div>
                    <!-- Serial Code -->
                    <div class="flex items-center space-x-4">
                        <div class="flex-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1" for="serialCode">Serial Code</label>
                            <input type="text" id="serialCode" name="serialCode" readonly class="w-full border border-gray-300 bg-gray-100 rounded-md px-4 py-2 text-gray-600" placeholder="Will be generated">
                        </div>
                        <button type="button" id="generateSerialBtn" class="mt-6 px-4 py-2 bg-navy-900 text-white rounded-md hover:bg-slate-500 transition-colors">Generate Next Serial</button>
                        <!-- Barcode Preview -->
                        <img id="barcodePreview" src="file:///C:/Users/Yoga%20Vyleralabs/.gemini/antigravity-ide/brain/d26694e1-c73e-43b6-8663-834503153e6e/barcode_placeholder_1779702919274.png" alt="Barcode" class="mt-3 hidden w-40 h-16 object-contain" />
                    </div>
                    <!-- Submit -->
                    <div class="flex justify-end">
                        <button type="submit" class="px-6 py-2 bg-navy-900 text-white rounded-md hover:bg-slate-500 transition-colors">Publish to Library</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Global Scripts -->
    <script src="js/global.js" defer></script>
    <script src="js/admin-add-book.js" defer></script>
</body>
</html>
