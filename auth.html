<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PustakaFlow - Sign In</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        navy: {
                            900: '#111827',
                        },
                        silver: {
                            300: '#D1D5DB',
                            400: '#9CA3AF',
                        },
                        mainbg: '#F9FAFB',
                    }
                }
            }
        }
    </script>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="bg-mainbg font-sans min-h-screen flex items-center justify-center text-gray-800">

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        
        <div class="text-center mb-8">
            <img src="image/logo.png" alt="PustakaFlow Logo" class="h-12 w-auto mx-auto mb-4">
            <p class="text-sm text-gray-500">Welcome back. Please sign in to your account.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-navy-900 focus:border-navy-900 transition-colors">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <a href="#" class="text-xs text-navy-900 hover:text-gray-600 transition-colors font-medium">Forgot password?</a>
                </div>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-navy-900 focus:border-navy-900 transition-colors">
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-navy-900 hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-navy-900 transition-colors">
                    Sign In
                </button>
            </div>
            
            <div class="text-center mt-6">
                <p class="text-sm text-gray-500">
                    Don't have an account? <a href="#" class="text-navy-900 font-medium hover:text-gray-600 transition-colors">Register here</a>
                </p>
            </div>
        </form>
        
    </div>

    <!-- External Scripts -->
    <script src="js/auth.js" defer></script>
</body>
</html>
